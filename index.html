<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raja Gupta Act | Professional Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-indigo-50 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyBCX9rALYZSxzYvawPexwXIHTSA3uhU24E",
      authDomain: "rajaguptaact.firebaseapp.com",
      projectId: "rajaguptaact",
      storageBucket: "rajaguptaact.firebasestorage.app",
      messagingSenderId: "9946165167",
      appId: "1:9946165167:web:5809fb442b06882980495a"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function App() {
      const [view, setView] = React.useState('gallery');
      const [artworks, setArtworks] = React.useState([]);
      const [cart, setCart] = React.useState([]);

      // Fetch Data from "RajaStudio"
      React.useEffect(() => {
        const unsub = db.collection("RajaStudio").onSnapshot(snap => {
          setArtworks(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });
        return () => unsub();
      }, []);

      const nav = (v) => setView(v);

      return (
        <div>
          <nav className="bg-white p-4 flex justify-between shadow-md">
            <h1 className="text-xl font-black text-purple-700" onClick={() => nav('gallery')}>RAJA GUPTA ACT</h1>
            <div className="flex gap-4">
              <button onClick={() => nav('gallery')}>Gallery</button>
              <button onClick={() => nav('cart')}>Cart ({cart.length})</button>
              <button onClick={() => nav('notifications')}>Notifications</button>
              <button onClick={() => nav('commission')}>Commission</button>
              <button onClick={() => nav('admin')}>Admin</button>
              <a href="https://wa.me/917281074416" className="text-green-600">Help (WhatsApp)</a>
            </div>
          </nav>

          <main className="p-6">
            {view === 'gallery' && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {artworks.map(art => (
                  <div key={art.id} className="bg-white p-4 rounded-xl shadow">
                    <img src={art.image} className="w-full h-48 object-cover rounded" />
                    <h2 className="font-bold text-lg mt-2">{art.title}</h2>
                    <p className="text-sm text-gray-600">{art.description}</p>
                    <button onClick={() => setCart([...cart, art])} className="bg-purple-600 text-white w-full py-2 mt-4 rounded">Add to Cart</button>
                  </div>
                ))}
              </div>
            )}
            {view === 'admin' && (
               <div className="bg-white p-6 rounded-xl shadow">
                 <h2 className="text-2xl font-black mb-4">Admin Panel</h2>
                 <p>Upload tools and order management would go here.</p>
               </div>
            )}
            {/* Add other view sections (Cart, Commission, Notifications) here */}
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
