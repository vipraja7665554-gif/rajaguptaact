<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raja Gupta Act | Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #fcfaf7; color: #1c1917; }
    .title-font { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const firebaseConfig = {
      apiKey: "AIzaSyBCX9rALYZSxzYvawPexwXIHTSA3uhU24E",
      authDomain: "rajaguptaact.firebaseapp.com",
      projectId: "rajaguptaact",
      storageBucket: "rajaguptaact.firebasestorage.app",
      messagingSenderId: "9946165167",
      appId: "1:9946165167:web:5809fb442b06882980495a"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function App() {
      const [artworks, setArtworks] = useState([]);
      const [orders, setOrders] = useState([]);
      const [view, setView] = useState('gallery');

      useEffect(() => {
        db.collection("RajaStudio").onSnapshot(s => setArtworks(s.docs.map(d => ({id: d.id, ...d.data()}))));
        db.collection("orders").onSnapshot(s => setOrders(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.createdAt - a.createdAt)));
      }, []);

      return (
        <div className="max-w-6xl mx-auto px-6 py-12">
          <div className="text-center mb-16 border-b border-stone-200 pb-12">
            <h1 className="title-font text-5xl md:text-7xl tracking-tighter uppercase">Raja Gupta Act</h1>
            <div className="mt-6 flex justify-center gap-6">
              <button onClick={() => setView('gallery')} className="text-[10px] uppercase tracking-[0.3em] font-bold">Gallery</button>
              <button onClick={() => setView('admin')} className="text-[10px] uppercase tracking-[0.3em] font-bold text-stone-400">Admin</button>
            </div>
          </div>

          {view === 'admin' ? (
            <div className="space-y-4">
              <h2 className="text-xl font-bold mb-6">Orders Management</h2>
              {orders.map(o => (
                <div key={o.id} className="bg-white p-6 rounded-2xl flex justify-between items-center shadow-sm border border-stone-100">
                  <div>
                    <p className="font-bold text-lg">{o.name || "Customer"}</p>
                    <p className="text-xs text-stone-400">{o.date} | {o.time}</p>
                  </div>
                  <button onClick={() => db.collection('orders').doc(o.id).delete()} className="text-red-500 font-bold text-xs uppercase">Delete</button>
                </div>
              ))}
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
              {artworks.map(art => (
                <div key={art.id} className="bg-white p-4 rounded-3xl border border-stone-100 shadow-sm">
                  <img src={art.image} loading="lazy" className="w-full h-80 object-cover rounded-2xl mb-6" />
                  <h2 className="text-2xl font-bold mb-4">{art.title}</h2>
                  <div className="grid grid-cols-2 gap-2">
                    <div className="bg-stone-900 text-white p-2 rounded-lg text-[10px] font-bold text-center">ORIG: ₹{art.priceOriginal}</div>
                    <div className="bg-stone-200 p-2 rounded-lg text-[10px] font-bold text-center">A3: ₹{art.priceA3}</div>
                    <div className="bg-stone-200 p-2 rounded-lg text-[10px] font-bold text-center">A4: ₹{art.priceA4}</div>
                    <div className="bg-stone-200 p-2 rounded-lg text-[10px] font-bold text-center">A5: ₹{art.priceA5}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
