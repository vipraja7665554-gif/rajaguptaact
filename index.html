<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raja Gupta Act | Professional Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const firebaseConfig = {
      apiKey: "AIzaSyBCX9rALYZSxzYvawPexwXIHTSA3uhU24E",
      authDomain: "rajaguptaact.firebaseapp.com",
      projectId: "rajaguptaact",
      storageBucket: "rajaguptaact.firebasestorage.app",
      messagingSenderId: "9946165167",
      appId: "1:9946165167:web:5809fb442b06882980495a"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function App() {
      const [artworks, setArtworks] = useState([]);
      const [orders, setOrders] = useState([]);
      const [view, setView] = useState('gallery');

      useEffect(() => {
        db.collection("RajaStudio").onSnapshot(s => setArtworks(s.docs.map(d => ({id: d.id, ...d.data()}))));
        db.collection("orders").onSnapshot(s => setOrders(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.createdAt - a.createdAt)));
      }, []);

      return (
        <div className="p-6 max-w-6xl mx-auto">
          <h1 className="text-center text-4xl font-black py-10 uppercase">Raja Gupta Act</h1>
          <div className="text-center mb-10">
             <button onClick={() => setView('gallery')} className="mx-2 underline">Gallery</button>
             <button onClick={() => setView('admin')} className="mx-2 underline">Admin</button>
          </div>

          {view === 'admin' ? (
            <div className="space-y-4">
              {orders.map(o => (
                <div key={o.id} className="bg-white p-4 border rounded shadow-sm flex justify-between">
                  <p>{o.name} - ₹{o.amount}</p>
                  <button onClick={() => db.collection('orders').doc(o.id).delete()} className="text-red-500">Delete</button>
                </div>
              ))}
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {artworks.map(art => (
                <div key={art.id} className="bg-white p-4 rounded shadow">
                  <img src={art.image} className="w-full h-64 object-cover rounded mb-4" />
                  <h2 className="font-bold text-xl">{art.title}</h2>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
