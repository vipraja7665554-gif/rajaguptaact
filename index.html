<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raja Gupta Act | Professional Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#fcfaf7]">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const db = firebase.firestore();
    const BOT_USERNAME = "@rajaguptaact";

    function App() {
      const [view, setView] = useState('gallery');
      const [artworks, setArtworks] = useState([]);
      const [orders, setOrders] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);

      useEffect(() => {
        db.collection("RajaStudio").onSnapshot(s => setArtworks(s.docs.map(d => ({id: d.id, ...d.data()}))));
        db.collection("orders").onSnapshot(s => setOrders(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.createdAt - a.createdAt)));
      }, []);

      return (
        <div className="max-w-6xl mx-auto p-6">
          <header className="text-center py-12 border-b border-stone-200">
            <h1 className="text-6xl font-black uppercase mb-4">Raja Gupta Act</h1>
            <div className="flex justify-center gap-6">
              <button onClick={() => setView('gallery')} className="text-xs font-bold uppercase tracking-widest">Gallery</button>
              <button onClick={() => setIsAdmin(!isAdmin)} className="text-xs font-bold uppercase tracking-widest text-stone-400">Admin</button>
            </div>
          </header>

          {isAdmin ? (
            <div className="py-10">
              <h2 className="text-2xl font-bold mb-6">Orders History</h2>
              {orders.map(o => (
                <div key={o.id} className="bg-white p-6 rounded-2xl flex justify-between items-center mb-4 border border-stone-100 shadow-sm">
                  <div>
                    <p className="font-bold">{o.name || "Customer"}</p>
                    <p className="text-xs text-stone-500">{o.date} {o.time}</p>
                  </div>
                  <button onClick={() => db.collection('orders').doc(o.id).delete()} className="text-red-500 font-bold text-xs uppercase">Delete</button>
                </div>
              ))}
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 py-10">
              {artworks.map(art => (
                <div key={art.id} className="bg-white p-4 rounded-3xl border border-stone-100 shadow-sm">
                  <img src={art.image} loading="lazy" className="w-full h-80 object-cover rounded-2xl mb-4" />
                  <h2 className="text-2xl font-bold mb-4">{art.title}</h2>
                  <div className="grid grid-cols-2 gap-2">
                    <div className="bg-stone-900 text-white p-3 rounded-lg text-[10px] font-bold text-center">ORIG: ₹{art.priceOriginal}</div>
                    <div className="bg-stone-200 p-3 rounded-lg text-[10px] font-bold text-center">A3: ₹{art.priceA3}</div>
                    <div className="bg-stone-200 p-3 rounded-lg text-[10px] font-bold text-center">A4: ₹{art.priceA4}</div>
                    <div className="bg-stone-200 p-3 rounded-lg text-[10px] font-bold text-center">A5: ₹{art.priceA5}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
