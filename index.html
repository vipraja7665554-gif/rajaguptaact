<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raja Gupta Act | Professional Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #fcfaf7; color: #1c1917; }
    .title-font { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const db = firebase.firestore();

    function App() {
      const [artworks, setArtworks] = useState([]);
      useEffect(() => {
        db.collection("RajaStudio").onSnapshot(s => setArtworks(s.docs.map(d => ({id: d.id, ...d.data()}))));
      }, []);

      return (
        <div className="max-w-6xl mx-auto px-6 py-12">
          {/* Website Name Section */}
          <div className="text-center mb-16 border-b border-stone-200 pb-12">
            <h1 className="title-font text-5xl md:text-7xl tracking-tighter uppercase">Raja Gupta Act</h1>
            <p className="text-stone-500 uppercase tracking-[0.3em] text-xs mt-4">Professional Art Studio</p>
          </div>

          {/* Gallery */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {artworks.map(art => (
              <div key={art.id} className="bg-white p-4 rounded-2xl border border-stone-100 shadow-sm">
                <img src={art.image} loading="lazy" className="w-full h-80 object-cover rounded-xl mb-6" />
                <h2 className="text-2xl font-bold mb-4">{art.title}</h2>
                <div className="grid grid-cols-2 gap-2">
                  <div className="bg-stone-900 text-white p-3 rounded-lg text-xs font-bold text-center">ORIG: ₹{art.priceOriginal}</div>
                  <div className="bg-stone-200 p-3 rounded-lg text-xs font-bold text-center">A3: ₹{art.priceA3}</div>
                  <div className="bg-stone-200 p-3 rounded-lg text-xs font-bold text-center">A4: ₹{art.priceA4}</div>
                  <div className="bg-stone-200 p-3 rounded-lg text-xs font-bold text-center">A5: ₹{art.priceA5}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
