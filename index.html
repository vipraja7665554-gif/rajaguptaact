            let msg = `🛡️ *SECURITY ALERT: ADMIN LOGIN* 🛡️\n\n`;
            
            if (status === 'SUCCESS_TRUSTED') msg += `*Status:* ✅ SUCCESSFUL LOGIN (Trusted Device)\n`;
            else if (status === 'SEND_OTP') msg += `*Status:* ⚠️ NEW LOGIN ATTEMPT\nUse this OTP to verify:\n\n🔑 *YOUR SECRET 6-DIGIT OTP:* \`${attemptedData}\`\n\n`;
            else if (status === 'NEW_DEVICE_VERIFIED') msg += `*Status:* 🟢 DEVICE VERIFIED SUCCESSFULLY\n`;
            else if (status === 'OTP_FAILED') msg += `*Status:* ❌ LOGIN BLOCKED\n(Wrong OTP entered: ${attemptedData})\n`;
            else if (status === 'FAILED') msg += `*Status:* ❌ FAILED LOGIN ATTEMPT\n*Wrong Password:* \`${attemptedData}\`\n`;
            else if (status === 'BLOCKED') msg += `*Status:* ⛔ IP/DEVICE BLOCKED FOR 15 MINS\n(Too many failed attempts/spams)\n`;
            else if (status === 'SECURE_LOGOUT') msg += `*Status:* 🔓 SECURE LOGOUT (Device Saved)\n`;

            msg += `*Time:* ${date} • ${time}\n\n`;
            msg += `*📡 Tracked Details:*\n`;
            msg += `*Device Type:* ${dev.deviceType || "Unknown"}\n`;
            msg += `*Exact Model:* ${dev.deviceModel}\n`;
            msg += `*IP Address:* ${dev.ip}\n`;
            msg += `*Location:* ${dev.location}\n`;
            msg += `*Network/ISP:* ${dev.org}\n`;

            const safeMsg = encodeURIComponent(msg);
            const url = `https://api.telegram.org/bot${SECURITY_BOT_TOKEN}/sendMessage?chat_id=${SECURITY_CHAT_ID}&text=${safeMsg}&parse_mode=Markdown`;
            fetch(url).catch(e => console.log(e));
        } catch(e) { console.error(e); }
