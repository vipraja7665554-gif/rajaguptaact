<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raja Gupta Act | Professional Colour Pencil Studio</title>
  
  <!-- Tailwind, React, Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <!-- FIREBASE CLOUD DATABASE -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* IMAGE SECURITY CSS: Stops mobile long-press and text selection */
    img { 
      image-rendering: -webkit-optimize-contrast; 
      image-rendering: crisp-edges; 
      image-rendering: high-quality; 
      -webkit-touch-callout: none; /* Disables long-press on iOS/Android */
      -webkit-user-select: none; 
      -khtml-user-select: none; 
      -moz-user-select: none; 
      -ms-user-select: none; 
      user-select: none;
      -webkit-user-drag: none; /* Disables drag & drop */
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    /* Transparent overlay to block exact clicking */
    .img-protect-overlay { position: absolute; inset: 0; z-index: 20; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 text-gray-900 font-sans antialiased selection:bg-purple-300" onContextMenu="return false;">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const ADMIN_PASSWORD = "RAJA_ADMIN_2026"; 

    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyBCX9rALYZSxzYvawPexwXIHTSA3uhU24E",
      authDomain: "rajaguptaact.firebaseapp.com",
      projectId: "rajaguptaact",
      storageBucket: "rajaguptaact.firebasestorage.app",
      messagingSenderId: "9946165167",
      appId: "1:9946165167:web:5809fb442b06882980495a"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- CART MEMORY ---
    const safeParse = (key, defaultVal) => {
      try { const val = localStorage.getItem(key); return val ? JSON.parse(val) : defaultVal; } 
      catch (e) { return defaultVal; }
    };

    // --- SECURE A4 MOCKUP COMPONENTS ---
    const A4Frame = ({ src, className }) => (
      <div className={`bg-white p-1.5 md:p-2 border-[8px] md:border-[12px] border-gray-900 z-10 flex items-center justify-center w-[52%] aspect-[1/1.414] relative ${className}`}>
        {/* Anti-Theft Overlay */}
        <div className="img-protect-overlay"></div> 
        <img 
          src={src} 
          alt="Artwork" 
          className="w-full h-full object-cover pointer-events-none" 
          onContextMenu={(e) => e.preventDefault()} 
          onDragStart={(e) => e.preventDefault()} 
        />
      </div>
    );

    const FrameMockup = ({ src }) => (
      <div className="w-full aspect-square bg-gradient-to-br from-gray-100 to-gray-300 rounded-2xl flex items-center justify-center p-4 shadow-inner relative overflow-hidden select-none">
        <A4Frame src={src} className="shadow-2xl transition-transform hover:scale-105 duration-500" />
      </div>
    );

    const WallMockup = ({ src }) => (
      <div className="w-full aspect-square rounded-2xl flex items-center justify-center p-4 shadow-inner relative overflow-hidden bg-[#2a3441] select-none">
        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: "linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px)", backgroundSize: "20px 100%" }}></div>
        <div className="absolute top-2 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center">
           <div className="w-2 h-2 bg-gradient-to-b from-yellow-300 to-yellow-600 rounded-sm"></div>
           <div className="w-16 h-3 bg-gradient-to-b from-yellow-200 to-yellow-600 rounded-full shadow-[0_5px_15px_rgba(255,220,100,0.5)] border border-yellow-200/50"></div>
        </div>
        <div className="absolute top-4 left-1/2 -translate-x-1/2 w-[150%] h-[100%] bg-gradient-to-b from-yellow-100/20 via-yellow-50/5 to-transparent z-20" style={{ clipPath: 'polygon(43% 0, 57% 0, 100% 100%, 0% 100%)' }}></div>
        <A4Frame src={src} className="mt-4 shadow-[0_30px_50px_rgba(0,0,0,0.8)] transition-transform hover:scale-105 duration-500 relative z-10" />
      </div>
    );

    const TableMockup = ({ src }) => (
      <div className="w-full aspect-square rounded-2xl relative overflow-hidden shadow-inner flex justify-center items-end pb-[10%] select-none">
        <div className="absolute top-0 left-0 w-full h-[75%] bg-gradient-to-b from-gray-100 to-gray-300"></div>
        <div className="absolute bottom-0 left-0 w-full h-[25%] bg-amber-900 border-t-[8px] border-amber-950 shadow-inner"></div>
        <A4Frame src={src} className="relative z-10 shadow-[0_20px_20px_-5px_rgba(0,0,0,0.8)] transition-transform hover:-translate-y-2 duration-500" />
      </div>
    );

    function App() {
      // --- STATE MANAGEMENT ---
      const [view, setView] = useState('gallery');
      const [menuOpen, setMenuOpen] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [password, setPassword] = useState('');
      
      const [artworks, setArtworks] = useState([]);
      const [orders, setOrders] = useState([]);
      const [announcements, setAnnouncements] = useState([]);
      const [cart, setCart] = useState(() => safeParse('raja_cart', []));
      const [checkoutData, setCheckoutData] = useState({ name: '', phone: '', address: '', pin: '', type: '', itemDetails: null, amount: 0 });
      
      const [uploadData, setUploadData] = useState({ title: '', desc: '', image: '', priceOriginal: '', priceA3: '', priceA4: '', priceA5: '' });
      const [annTitle, setAnnTitle] = useState('');
      const [annMsg, setAnnMsg] = useState('');

      // --- REAL-TIME DATABASE SYNC ---
      useEffect(() => {
        const unsubArt = db.collection("RajaStudio").onSnapshot(snap => {
          setArtworks(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.createdAt - a.createdAt));
        });
        const unsubOrd = db.collection("orders").onSnapshot(snap => {
          setOrders(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.createdAt - a.createdAt));
        });
        const unsubAnn = db.collection("announcements").onSnapshot(snap => {
          setAnnouncements(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.createdAt - a.createdAt));
        });
        return () => { unsubArt(); unsubOrd(); unsubAnn(); };
      }, []);

      useEffect(() => localStorage.setItem('raja_cart', JSON.stringify(cart)), [cart]);
      useEffect(() => { feather.replace(); }, [view, menuOpen, artworks, orders, announcements]);

      // Global Anti-Right-Click effect
      useEffect(() => {
        const handleContext = (e) => e.preventDefault();
        document.addEventListener('contextmenu', handleContext);
        return () => document.removeEventListener('contextmenu', handleContext);
      }, []);

      const nav = (v) => { setView(v); setMenuOpen(false); window.scrollTo(0,0); };

      const addToCart = (art, size, price) => {
        setCart([...cart, { ...art, selectedSize: size, price: Number(price), cartId: Date.now() }]);
        alert("Artwork added to your Cart!");
      };

      const startCheckout = (items, type) => {
        let total = items.reduce((sum, item) => sum + item.price, 0);
        setCheckoutData({ ...checkoutData, type, itemDetails: items, amount: total });
        nav('checkout_form');
      };

      // --- ALL THE VIEWS ---
      const GalleryView = () => (
        <div className="p-4 md:p-8 max-w-6xl mx-auto space-y-12">
          <div className="text-center space-y-4 mb-12 glass-panel p-10 rounded-3xl shadow-lg border-t-4 border-t-purple-500">
            <h1 className="text-4xl md:text-5xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500">
              Highly Detailed Realistic Portraits
            </h1>
            <p className="text-gray-700 font-bold text-lg max-w-2xl mx-auto">
              Welcome to my professional studio. All gallery pieces are 100% authentic, highly detailed <span className="text-purple-600">Colour Pencil</span> artworks. Every original piece is strictly drawn on premium <span className="text-pink-600">A4 size paper</span>.
            </p>
          </div>
          
          {artworks.length === 0 ? (
            <div className="text-center p-12 glass-panel rounded-3xl shadow-xl font-bold text-purple-600 text-xl">Loading Gallery from Studio Database...</div>
          ) : (
            artworks.map(art => (
              <div key={art.id} className="glass-panel rounded-3xl shadow-xl overflow-hidden p-6 md:p-10 mb-10">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b pb-4 border-gray-200">
                  <div>
                    <h2 className="text-3xl font-black text-gray-900">{art.title}</h2>
                    <span className="inline-block mt-2 bg-gradient-to-r from-purple-100 to-pink-100 text-purple-800 text-xs font-black px-3 py-1 rounded-full border border-purple-200">100% COLOUR PENCIL</span>
                  </div>
                  <p className="text-gray-600 font-medium max-w-md mt-4 md:mt-0 text-sm md:text-right">{art.desc}</p>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                  <div><FrameMockup src={art.image} /><p className="text-center font-bold mt-3 text-sm text-gray-500 uppercase tracking-widest">In Frame</p></div>
                  <div><WallMockup src={art.image} /><p className="text-center font-bold mt-3 text-sm text-gray-500 uppercase tracking-widest">Home Wall</p></div>
                  <div><TableMockup src={art.image} /><p className="text-center font-bold mt-3 text-sm text-gray-500 uppercase tracking-widest">On Table</p></div>
                </div>
                
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                  <div className="bg-gradient-to-br from-purple-600 to-indigo-600 p-5 rounded-2xl shadow-lg text-center transform hover:-translate-y-1 transition text-white">
                    <p className="font-bold text-purple-100 text-sm">Original Artwork</p>
                    <p className="font-black text-lg mb-1">A4 Size (Colour Pencil)</p>
                    <p className="text-2xl font-black my-2">₹{art.priceOriginal}</p>
                    <button onClick={() => addToCart(art, 'Original A4 Colour Pencil', art.priceOriginal)} className="w-full bg-white text-purple-700 py-2.5 rounded-xl font-bold shadow-md hover:bg-gray-50 cursor-pointer">Add to Cart</button>
                  </div>
                  <div className="bg-white p-5 rounded-2xl shadow-md text-center border-2 border-transparent hover:border-pink-400 transition">
                    <p className="font-bold text-gray-500 text-sm">HD Print</p>
                    <p className="font-black text-gray-800 text-lg mb-1">A3 Size</p>
                    <p className="text-2xl font-black text-pink-600 my-2">₹{art.priceA3}</p>
                    <button onClick={() => addToCart(art, 'Print A3', art.priceA3)} className="w-full bg-gray-100 text-gray-900 py-2.5 rounded-xl font-bold hover:bg-pink-50 hover:text-pink-600 transition cursor-pointer">Add to Cart</button>
                  </div>
                  <div className="bg-white p-5 rounded-2xl shadow-md text-center border-2 border-transparent hover:border-pink-400 transition">
                    <p className="font-bold text-gray-500 text-sm">HD Print</p>
                    <p className="font-black text-gray-800 text-lg mb-1">A4 Size</p>
                    <p className="text-2xl font-black text-pink-600 my-2">₹{art.priceA4}</p>
                    <button onClick={() => addToCart(art, 'Print A4', art.priceA4)} className="w-full bg-gray-100 text-gray-900 py-2.5 rounded-xl font-bold hover:bg-pink-50 hover:text-pink-600 transition cursor-pointer">Add to Cart</button>
                  </div>
                  <div className="bg-white p-5 rounded-2xl shadow-md text-center border-2 border-transparent hover:border-pink-400 transition">
                    <p className="font-bold text-gray-500 text-sm">HD Print</p>
                    <p className="font-black text-gray-800 text-lg mb-1">A5 Size</p>
                    <p className="text-2xl font-black text-pink-600 my-2">₹{art.priceA5}</p>
                    <button onClick={() => addToCart(art, 'Print A5', art.priceA5)} className="w-full bg-gray-100 text-gray-900 py-2.5 rounded-xl font-bold hover:bg-pink-50 hover:text-pink-600 transition cursor-pointer">Add to Cart</button>
                  </div>
                </div>
              </div>
            ))
          )}
        </div>
      );

      const CartView = () => {
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        return (
          <div className="p-6 max-w-3xl mx-auto min-h-screen">
            <h2 className="text-3xl font-black mb-8 border-b pb-4 text-purple-800">Your Cart</h2>
            {cart.length === 0 ? <p className="text-gray-500 font-bold glass-panel p-8 rounded-2xl text-center">Your cart is completely empty.</p> : (
              <div className="space-y-4">
                {cart.map((item, i) => (
                  <div key={i} className="flex items-center justify-between glass-panel p-4 rounded-2xl shadow-sm border border-white">
                    <div className="flex items-center gap-4">
                      <img src={item.image} className="w-20 h-20 object-cover rounded-xl shadow-md border-2 border-white pointer-events-none" />
                      <div><h4 className="font-black text-lg text-gray-900">{item.title}</h4><p className="text-sm font-bold text-purple-600">{item.selectedSize}</p></div>
                    </div>
                    <div className="text-right">
                      <p className="font-black text-xl text-gray-900">₹{item.price}</p>
                      <button onClick={() => setCart(cart.filter(c => c.cartId !== item.cartId))} className="text-rose-500 text-sm font-bold hover:underline mt-1 cursor-pointer">Remove</button>
                    </div>
                  </div>
                ))}
                <div className="bg-gradient-to-r from-purple-700 to-pink-600 text-white p-6 rounded-2xl mt-8 flex flex-col md:flex-row justify-between items-center shadow-xl">
                  <div className="mb-4 md:mb-0 text-center md:text-left"><p className="text-sm text-purple-200 font-bold">Total Payable</p><p className="text-4xl font-black">₹{total}</p></div>
                  <button onClick={() => startCheckout(cart, 'Gallery Purchase')} className="w-full md:w-auto bg-white text-purple-700 px-10 py-4 rounded-xl font-black text-lg shadow-lg hover:scale-105 transition-transform cursor-pointer">Proceed to Checkout</button>
                </div>
              </div>
            )}
          </div>
        );
      };

      const CommissionView = () => (
        <div className="p-6 max-w-xl mx-auto min-h-screen">
          <div className="mb-8 text-center">
             <h2 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 mb-2">Commission an Artwork</h2>
             <p className="text-gray-600 font-bold">Professional Colour Pencil Portraits</p>
          </div>
          <div className="bg-rose-50 border-l-4 border-rose-500 p-4 rounded-r-xl mb-6 shadow-sm">
             <p className="font-black text-rose-700 flex items-center gap-2"><i data-feather="alert-circle" className="w-5 h-5"></i> STRICTLY COLOUR PENCIL ONLY</p>
             <p className="text-sm text-rose-600 mt-1 font-medium">I do not accept orders for watercolor, oil, or digital mediums. All commissioned requests must be for highly detailed colour pencil artworks.</p>
          </div>
          <div className="glass-panel p-8 rounded-3xl shadow-xl">
            <form onSubmit={(e) => { 
                e.preventDefault(); 
                startCheckout([{ title: 'Commission: ' + e.target.subject.value, selectedSize: e.target.size.value, price: Number(e.target.budget.value) }], 'Commission'); 
              }} className="space-y-5">
              <div>
                <label className="font-black text-sm text-gray-800 uppercase tracking-wide">Artwork Subject Details</label>
                <input required name="subject" placeholder="E.g. Portrait of two people..." className="w-full border-2 border-gray-200 p-4 rounded-xl bg-white focus:border-purple-500 outline-none transition font-medium mt-1" />
              </div>
              <div>
                <label className="font-black text-sm text-gray-800 uppercase tracking-wide">Select Paper Size</label>
                <select name="size" className="w-full border-2 border-gray-200 p-4 rounded-xl bg-white focus:border-purple-500 outline-none transition font-medium mt-1">
                  <option value="A4 Colour Pencil">A4 Size (Medium)</option>
                  <option value="A3 Colour Pencil">A3 Size (Large)</option>
                </select>
              </div>
              <div>
                <label className="font-black text-sm text-gray-800 uppercase tracking-wide">Estimated Budget (₹)</label>
                <input required name="budget" type="number" min="500" placeholder="Enter amount..." className="w-full border-2 border-gray-200 p-4 rounded-xl bg-white focus:border-purple-500 outline-none transition font-medium mt-1" />
              </div>
              <button type="submit" className="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:shadow-xl transition-all mt-4 cursor-pointer">Proceed to Details</button>
            </form>
          </div>
        </div>
      );

      const PublicNotificationsView = () => (
        <div className="p-6 max-w-4xl mx-auto min-h-screen">
          <div className="mb-8 text-center">
             <h2 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 mb-2">Studio Announcements</h2>
             <p className="text-gray-600 font-bold">Latest news and offers from Raja Gupta</p>
          </div>
          {announcements.length === 0 ? (
            <div className="text-center p-12 glass-panel rounded-3xl shadow-md font-bold text-gray-500 text-lg">No new announcements at this time.</div>
          ) : (
            <div className="space-y-6">
              {announcements.map((ann) => (
                <div key={ann.id} className="glass-panel p-8 rounded-3xl shadow-lg border-l-8 border-purple-500 relative overflow-hidden">
                  <div className="absolute top-0 right-0 bg-purple-100 text-purple-700 text-xs font-black px-4 py-2 rounded-bl-xl border-b border-l border-purple-200">{ann.date}</div>
                  <h3 className="text-2xl font-black text-gray-900 mb-3">{ann.title}</h3>
                  <p className="text-gray-700 font-medium whitespace-pre-wrap">{ann.message}</p>
                </div>
              ))}
            </div>
          )}
        </div>
      );

      const CheckoutForm = () => {
        const handleShippingSubmit = (e) => {
          e.preventDefault();
          if (checkoutData.type === 'Commission') {
             db.collection('orders').add({
                 id: 'ORD-' + Math.floor(Math.random()*10000), 
                 date: new Date().toLocaleDateString(), 
                 createdAt: Date.now(),
                 ...checkoutData 
             });
             setCheckoutData({ name: '', phone: '', address: '', pin: '', type: '', itemDetails: null, amount: 0 });
             alert("Commission Request Sent Successfully! I will contact you via WhatsApp.");
             nav('gallery');
          } else {
             nav('payment');
          }
        };

        return (
          <div className="p-6 max-w-xl mx-auto min-h-screen">
            <h2 className="text-3xl font-black mb-6 text-purple-800 text-center">Shipping & Contact Details</h2>
            <form className="glass-panel p-8 rounded-3xl shadow-xl space-y-5" onSubmit={handleShippingSubmit}>
              <input required value={checkoutData.name} placeholder="Full Name" className="w-full border-2 border-gray-200 p-4 rounded-xl font-medium focus:border-purple-500 outline-none" onChange={e => setCheckoutData({...checkoutData, name: e.target.value})} />
              <input required value={checkoutData.phone} type="tel" placeholder="WhatsApp Number" className="w-full border-2 border-gray-200 p-4 rounded-xl font-medium focus:border-purple-500 outline-none" onChange={e => setCheckoutData({...checkoutData, phone: e.target.value})} />
              <textarea required value={checkoutData.address} placeholder="Full Delivery Address" className="w-full border-2 border-gray-200 p-4 rounded-xl font-medium focus:border-purple-500 outline-none" rows="3" onChange={e => setCheckoutData({...checkoutData, address: e.target.value})}></textarea>
              <input required value={checkoutData.pin} placeholder="PIN Code" className="w-full border-2 border-gray-200 p-4 rounded-xl font-medium focus:border-purple-500 outline-none" onChange={e => setCheckoutData({...checkoutData, pin: e.target.value})} />
              
              <button type="submit" className="w-full bg-gray-900 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-gray-800 transition-colors cursor-pointer">
                {checkoutData.type === 'Commission' ? "Submit Commission Request" : "Proceed to Secure Payment"}
              </button>
            </form>
          </div>
        );
      };

      const PaymentView = () => {
        const upiID = "7281074416@ybl";
        const upiLink = `upi://pay?pa=${upiID}&pn=Raja%20Gupta&am=${checkoutData.amount}&cu=INR`;
        const qrURL = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}&color=000000&bgcolor=ffffff`;

        const finalizeOrder = () => {
          db.collection('orders').add({
              id: 'ORD-' + Math.floor(Math.random()*10000), 
              date: new Date().toLocaleDateString(), 
              createdAt: Date.now(),
              ...checkoutData 
          });
          setCart([]); 
          setCheckoutData({ name: '', phone: '', address: '', pin: '', type: '', itemDetails: null, amount: 0 });
          alert("Payment Confirmed! Your order has been securely sent to my Admin Notifications.");
          nav('gallery');
        };

        return (
          <div className="p-6 max-w-md mx-auto text-center min-h-screen">
            <h2 className="text-3xl font-black mb-2 text-purple-800">Scan & Pay</h2>
            <p className="text-gray-600 mb-8 font-bold text-lg">Total Payable: <span className="text-pink-600 font-black text-2xl ml-2">₹{checkoutData.amount}</span></p>
            
            <div className="bg-white p-8 rounded-3xl shadow-2xl border-2 border-purple-100 mb-8 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-500 to-pink-500"></div>
              <img src={qrURL} alt="UPI QR Code" className="mx-auto mb-6 rounded-xl shadow-md border-4 border-gray-50 p-2 pointer-events-none" />
              <p className="font-black text-gray-800 text-sm tracking-widest uppercase">Scan with PhonePe, GPay, Paytm</p>
              <div className="bg-purple-50 border border-purple-100 p-4 rounded-xl mt-6 font-mono font-black text-purple-900 text-lg select-all cursor-pointer relative z-50">
                {upiID}
              </div>
              <p className="text-xs font-bold text-gray-400 mt-2">Tap to copy UPI ID</p>
            </div>
            
            <button onClick={finalizeOrder} className="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-4 rounded-xl font-black text-lg shadow-xl hover:shadow-2xl transition-all cursor-pointer">I Have Successfully Paid</button>
          </div>
        );
      };

      const AdminPanel = () => {
        const handleImage = (e) => {
          const file = e.target.files[0];
          if(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 1200; let w = img.width; let h = img.height;
                if (w > h && w > MAX) { h *= MAX / w; w = MAX; } 
                else if (h > MAX) { w *= MAX / h; h = MAX; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                setUploadData({...uploadData, image: canvas.toDataURL('image/jpeg', 0.85)});
              };
              img.src = event.target.result;
            };
            reader.readAsDataURL(file);
          }
        };

        const saveArtwork = (e) => {
          e.preventDefault();
          db.collection('RajaStudio').add({ ...uploadData, createdAt: Date.now() })
            .then(() => alert("Artwork Uploaded Globally!"));
          setUploadData({ title: '', desc: '', image: '', priceOriginal: '', priceA3: '', priceA4: '', priceA5: '' });
        };

        const postAnnouncement = (e) => {
          e.preventDefault();
          db.collection('announcements').add({ title: annTitle, message: annMsg, date: new Date().toLocaleDateString(), createdAt: Date.now() })
            .then(() => alert("Announcement Posted Globally!"));
          setAnnTitle(''); setAnnMsg('');
        };

        return (
          <div className="p-6 max-w-7xl mx-auto space-y-10 min-h-screen">
            <div className="flex justify-between items-center mb-8 glass-panel p-6 rounded-3xl shadow-sm">
              <h2 className="text-3xl font-black text-purple-900 flex items-center gap-3"><i data-feather="shield"></i> Admin Security Portal</h2>
              <button onClick={() => setIsAdmin(false)} className="bg-rose-100 text-rose-700 px-6 py-2.5 rounded-xl font-black hover:bg-rose-200 transition cursor-pointer">Logout</button>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
              <div className="space-y-8">
                <div className="glass-panel p-8 rounded-3xl shadow-xl border-t-4 border-t-purple-500">
                  <h3 className="text-2xl font-black mb-6 text-gray-900">Upload Colour Pencil Artwork</h3>
                  <form onSubmit={saveArtwork} className="space-y-4">
                    <input required placeholder="Artwork Title" className="w-full border-2 p-4 rounded-xl bg-white font-bold" value={uploadData.title} onChange={e => setUploadData({...uploadData, title: e.target.value})} />
                    <textarea required placeholder="Description..." className="w-full border-2 p-4 rounded-xl bg-white font-medium" rows="2" value={uploadData.desc} onChange={e => setUploadData({...uploadData, desc: e.target.value})}></textarea>
                    
                    <div className="border-2 border-dashed border-purple-300 p-6 rounded-xl text-center bg-purple-50 cursor-pointer">
                      <label className="font-black text-purple-700 block cursor-pointer">
                        <i data-feather="upload-cloud" className="mx-auto mb-2 w-8 h-8"></i>
                        {uploadData.image ? "Change Image" : "Select High-Resolution Image"}
                        <input type="file" accept="image/*" className="hidden" onChange={handleImage} required={!uploadData.image} />
                      </label>
                      {uploadData.image && <img src={uploadData.image} className="mt-4 h-40 mx-auto rounded-lg shadow-md object-contain border-2 border-white pointer-events-none" />}
                    </div>

                    <div className="grid grid-cols-2 gap-4 mt-6">
                      <div><label className="text-xs font-black text-gray-500 uppercase">Original A4 Price</label><input required type="number" placeholder="₹" className="w-full border-2 p-3 rounded-xl bg-white font-bold text-lg" value={uploadData.priceOriginal} onChange={e => setUploadData({...uploadData, priceOriginal: e.target.value})} /></div>
                      <div><label className="text-xs font-black text-gray-500 uppercase">Print A3 Price</label><input required type="number" placeholder="₹" className="w-full border-2 p-3 rounded-xl bg-white font-bold text-lg" value={uploadData.priceA3} onChange={e => setUploadData({...uploadData, priceA3: e.target.value})} /></div>
                      <div><label className="text-xs font-black text-gray-500 uppercase">Print A4 Price</label><input required type="number" placeholder="₹" className="w-full border-2 p-3 rounded-xl bg-white font-bold text-lg" value={uploadData.priceA4} onChange={e => setUploadData({...uploadData, priceA4: e.target.value})} /></div>
                      <div><label className="text-xs font-black text-gray-500 uppercase">Print A5 Price</label><input required type="number" placeholder="₹" className="w-full border-2 p-3 rounded-xl bg-white font-bold text-lg" value={uploadData.priceA5} onChange={e => setUploadData({...uploadData, priceA5: e.target.value})} /></div>
                    </div>
                    <button type="submit" className="w-full bg-gradient-to-r from-purple-600 to-pink-500 text-white py-4 rounded-xl font-black text-lg mt-6 shadow-lg cursor-pointer">Publish to Live Gallery</button>
                  </form>
                </div>

                <div className="glass-panel p-6 rounded-3xl shadow-sm border border-gray-200">
                  <h3 className="text-xl font-black text-gray-900 mb-4 flex items-center gap-2"><i data-feather="image"></i> Manage Artworks</h3>
                  {artworks.length === 0 ? <p className="text-gray-500 font-bold">No artworks published.</p> : (
                    <div className="space-y-3 max-h-64 overflow-y-auto">
                      {artworks.map(art => (
                        <div key={art.id} className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                           <div className="flex items-center gap-3">
                             <img src={art.image} className="w-12 h-12 object-cover rounded-lg border border-gray-200 pointer-events-none" />
                             <p className="font-bold text-sm text-gray-800 line-clamp-1">{art.title}</p>
                           </div>
                           <button onClick={() => { if(window.confirm("Delete globally?")) db.collection('RajaStudio').doc(art.id).delete(); }} className="p-2 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-100 cursor-pointer"><i data-feather="trash-2" className="w-4 h-4"></i></button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>

              <div className="space-y-8">
                <div className="glass-panel p-8 rounded-3xl shadow-xl border-t-4 border-t-pink-500">
                  <h3 className="text-2xl font-black text-gray-900 mb-6 flex items-center gap-2"><i data-feather="message-square"></i> Post Public Announcement</h3>
                  <form onSubmit={postAnnouncement} className="space-y-4">
                     <input required placeholder="Announcement Title" value={annTitle} onChange={e=>setAnnTitle(e.target.value)} className="w-full border-2 p-4 rounded-xl bg-white font-bold"/>
                     <textarea required placeholder="Message details..." value={annMsg} onChange={e=>setAnnMsg(e.target.value)} className="w-full border-2 p-4 rounded-xl bg-white font-medium" rows="3"></textarea>
                     <button type="submit" className="w-full bg-gray-900 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-gray-800 transition cursor-pointer">Post Notification</button>
                  </form>
                  {announcements.length > 0 && (
                    <div className="mt-6 pt-6 border-t border-gray-200 space-y-3">
                      {announcements.map(ann => (
                        <div key={ann.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-200">
                          <p className="font-bold text-sm line-clamp-1">{ann.title}</p>
                          <button onClick={() => { if(window.confirm("Delete globally?")) db.collection('announcements').doc(ann.id).delete(); }} className="text-rose-500 hover:text-rose-700 cursor-pointer"><i data-feather="trash-2" className="w-4 h-4"></i></button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="glass-panel p-8 rounded-3xl shadow-xl">
                  <h3 className="text-2xl font-black text-gray-900 mb-6 flex items-center gap-2"><i data-feather="inbox"></i> Secure Inbox: Orders</h3>
                  {orders.length === 0 ? <p className="text-gray-500 font-bold bg-white p-6 rounded-2xl text-center shadow-sm">No orders yet.</p> : (
                    <div className="space-y-6 max-h-[500px] overflow-y-auto">
                      {orders.map(o => (
                        <div key={o.id} className="bg-white p-6 rounded-3xl shadow-md border-l-8 border-pink-500">
                          <div className="flex justify-between items-start mb-4 border-b pb-4">
                            <div><p className="font-black text-xl text-gray-900">{o.id}</p><p className="text-sm font-bold text-gray-500">{o.date}</p></div>
                            <span className="bg-pink-100 text-pink-800 text-xs font-black px-4 py-1.5 rounded-full uppercase tracking-wider">{o.type}</span>
                          </div>
                          <div className="mb-4">
                            <p className="font-black text-lg text-gray-800">{o.name} <span className="text-green-500 mx-2">|</span> WA: {o.phone}</p>
                            <p className="text-sm font-bold text-gray-600 mt-1">{o.address}, PIN: {o.pin}</p>
                          </div>
                          <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                            {o.itemDetails && o.itemDetails.map((item, i) => (
                               <div key={i} className="flex justify-between text-sm font-bold border-b border-gray-200 pb-2 mb-2">
                                 <span className="text-gray-800">{item.title} <span className="text-pink-600">({item.selectedSize})</span></span>
                                 <span className="text-gray-900">₹{item.price}</span>
                               </div>
                            ))}
                            <div className="flex justify-between items-center text-lg font-black mt-4 pt-4 border-t border-gray-300">
                              <span className="text-gray-700">{o.type === 'Commission' ? 'Budget' : 'Total Paid'}</span>
                              <span className="text-green-600 text-2xl">₹{o.amount}</span>
                            </div>
                            <button onClick={() => { if(window.confirm("Delete this order?")) db.collection('orders').doc(o.id).delete(); }} className="mt-4 w-full bg-rose-50 text-rose-600 py-2 rounded-xl font-bold text-sm cursor-pointer">Delete Order</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col relative">
          {/* TOP HEADER WITH HAMBURGER BUTTON */}
          <header className="glass-panel sticky top-0 z-40 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
              <div className="text-2xl md:text-3xl font-black tracking-tighter cursor-pointer flex items-center gap-2" onClick={() => nav('gallery')}>
                <div className="bg-gradient-to-r from-purple-600 to-pink-500 text-white p-1.5 rounded-lg"><i data-feather="edit-2"></i></div>
                RAJA GUPTA <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500">ACT</span>
              </div>
              <button onClick={() => setMenuOpen(!menuOpen)} className="bg-gradient-to-r from-purple-600 to-pink-500 text-white font-black px-6 py-2.5 rounded-xl shadow-lg flex items-center gap-2 hover:opacity-90 transition cursor-pointer">
                <i data-feather={menuOpen ? "x" : "menu"}></i> <span className="hidden md:inline">MENU</span>
              </button>
            </div>
          </header>

          {/* DROP DOWN MENU */}
          {menuOpen && (
            <div className="fixed inset-0 top-20 z-50 bg-gray-900/40 backdrop-blur-sm" onClick={() => setMenuOpen(false)}>
              <div className="bg-white w-full md:w-96 absolute right-0 shadow-2xl flex flex-col font-black text-lg border-l border-gray-100 h-full transform transition-transform" onClick={e => e.stopPropagation()}>
                <div className="p-4 bg-gray-50 border-b text-xs text-gray-500 uppercase tracking-widest text-center">Navigation Menu</div>
                <button onClick={() => nav('gallery')} className="text-left p-6 border-b hover:bg-purple-50 flex items-center gap-4 text-gray-800 hover:text-purple-700 transition cursor-pointer"><i data-feather="image"></i> Gallery</button>
                <button onClick={() => nav('cart')} className="text-left p-6 border-b hover:bg-purple-50 flex items-center justify-between text-gray-800 hover:text-purple-700 transition cursor-pointer">
                  <span className="flex items-center gap-4"><i data-feather="shopping-bag"></i> Cart</span>
                  {cart.length > 0 && <span className="bg-pink-500 text-white text-sm px-3 py-1 rounded-full shadow-sm">{cart.length}</span>}
                </button>
                <button onClick={() => nav('public_notifications')} className="text-left p-6 border-b hover:bg-pink-50 flex items-center gap-4 text-purple-700 transition cursor-pointer"><i data-feather="bell"></i> Public Notifications</button>
                <button onClick={() => nav('commission')} className="text-left p-6 border-b hover:bg-purple-50 flex items-center gap-4 text-gray-800 hover:text-purple-700 transition cursor-pointer"><i data-feather="pen-tool"></i> Commission</button>
                <button onClick={() => nav('admin')} className="text-left p-6 border-b hover:bg-gray-100 flex items-center gap-4 text-gray-400 hover:text-gray-700 transition cursor-pointer"><i data-feather="lock"></i> Admin Panel</button>
                <a href="https://wa.me/917281074416" target="_blank" rel="noopener noreferrer" className="text-left p-6 bg-green-50 text-green-700 hover:bg-green-100 flex items-center gap-4 mt-auto transition cursor-pointer"><i data-feather="message-circle"></i> Help (WhatsApp)</a>
              </div>
            </div>
          )}

          {/* MAIN CONTENT AREA */}
          <main className="flex-grow z-10 relative">
            {view === 'gallery' && GalleryView()}
            {view === 'cart' && CartView()}
            {view === 'commission' && CommissionView()}
            {view === 'checkout_form' && CheckoutForm()}
            {view === 'payment' && PaymentView()}
            {view === 'public_notifications' && PublicNotificationsView()}
            {view === 'admin' && (
              isAdmin ? AdminPanel() : 
              <div className="p-6 max-w-sm mx-auto mt-20 text-center">
                <div className="glass-panel p-10 rounded-3xl shadow-2xl border-t-4 border-t-gray-900">
                  <div className="bg-gray-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                    <i data-feather="shield" className="text-gray-900 w-8 h-8"></i>
                  </div>
                  <h2 className="font-black text-2xl mb-2 text-gray-900">Admin Security</h2>
                  <p className="text-sm font-bold text-gray-500 mb-8">Protected Access Only</p>
                  <input type="password" placeholder="Enter Password" value={password} onChange={e => setPassword(e.target.value)} className="w-full border-2 border-gray-200 p-4 rounded-xl mb-6 text-center tracking-widest font-black focus:border-gray-900 outline-none" />
                  <button onClick={() => { if(password === ADMIN_PASSWORD) { setIsAdmin(true); setPassword(''); } else alert('Access Denied: Incorrect Password'); }} className="w-full bg-gray-900 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:shadow-xl transition-all cursor-pointer">Secure Login</button>
                </div>
              </div>
            )}
          </main>

          {/* FOOTER (Down side contact logos for WhatsApp and Instagram) */}
          <footer className="glass-panel py-6 mt-12 flex-shrink-0 relative z-10">
            <div className="flex justify-center items-center gap-8 relative">
              <a href="https://wa.me/917281074416" target="_blank" rel="noopener noreferrer" className="p-4 bg-white text-green-500 rounded-full hover:bg-green-500 hover:text-white transition-all shadow-md hover:shadow-xl transform hover:-translate-y-1 block cursor-pointer">
                <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
              </a>
              <a href="https://www.instagram.com/rajaguptaact?igsh=NGg5bmJuczJlNnM1" target="_blank" rel="noopener noreferrer" className="p-4 bg-white text-pink-600 rounded-full shadow-md block cursor-pointer hover:bg-gradient-to-tr hover:from-yellow-400 hover:via-pink-500 hover:to-purple-600 hover:text-white transition-all transform hover:-translate-y-1">
                 <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
              </a>
            </div>
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
