<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raja Gupta Act | Professional Colour Pencil Studio</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <!-- FIREBASE CLOUD DATABASE -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

  <style>
    img {

      image-rendering: high-quality; 
      -webkit-touch-callout: none; 
      -webkit-user-select: none; 
      -khtml-user-select: none; 
      -moz-user-select: none; 
      -ms-user-select: none; 
      user-select: none;
      -webkit-user-drag: none;

    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 text-gray-900 font-sans antialiased selection:bg-purple-300" onContextMenu="return false;">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const ADMIN_PASSWORD = "RAJA_ADMIN_2026"; 

    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyBCX9rALYZSxzYvawPexwXIHTSA3uhU24E",
      authDomain: "rajaguptaact.firebaseapp.com",
      projectId: "rajaguptaact",
      storageBucket: "rajaguptaact.firebasestorage.app",
      messagingSenderId: "9946165167",
      appId: "1:9946165167:web:5809fb442b06882980495a"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const safeParse = (key, defaultVal) => {
      try { const val = localStorage.getItem(key); return val ? JSON.parse(val) : defaultVal; } 
      catch (e) { return defaultVal; }
    };

    const A4Frame = ({ src, className }) => (
      <div className={`bg-white p-1.5 md:p-2 border-[8px] md:border-[12px] border-gray-900 z-10 flex items-center justify-center w-[52%] aspect-[1/1.414] relative ${className}`}>
        <div className="img-protect-overlay"></div> 
        <img src={src} alt="Artwork" className="w-full h-full object-cover pointer-events-none" onContextMenu={(e) => e.preventDefault()} onDragStart={(e) => e.preventDefault()} />
      </div>
    );

    const FrameMockup = ({ src }) => (
      <div className="w-full aspect-square bg-gradient-to-br from-gray-100 to-gray-300 rounded-2xl flex items-center justify-center p-4 shadow-inner relative overflow-hidden select-none">
        <A4Frame src={src} className="shadow-2xl transition-transform hover:scale-105 duration-500" />
      </div>
    );

    const WallMockup = ({ src }) => {
      const bgStyle = { backgroundImage: "linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px)", backgroundSize: "20px 100%" };
      const clipStyle = { clipPath: 'polygon(43% 0, 57% 0, 100% 100%, 0% 100%)' };
      
      return (
        <div className="w-full aspect-square rounded-2xl flex items-center justify-center p-4 shadow-inner relative overflow-hidden bg-[#2a3441] select-none">
          <div className="absolute inset-0 opacity-10" style={bgStyle}></div>
          <div className="absolute top-2 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center">
             <div className="w-2 h-2 bg-gradient-to-b from-yellow-300 to-yellow-600 rounded-sm"></div>
             <div className="w-16 h-3 bg-gradient-to-b from-yellow-200 to-yellow-600 rounded-full shadow-[0_5px_15px_rgba(255,220,100,0.5)] border border-yellow-200/50"></div>
          </div>
          <div className="absolute top-4 left-1/2 -translate-x-1/2 w-[150%] h-[100%] bg-gradient-to-b from-yellow-100/20 via-yellow-50/5 to-transparent z-20" style={clipStyle}></div>
          <A4Frame src={src} className="mt-4 shadow-[0_30px_50px_rgba(0,0,0,0.8)] transition-transform hover:scale-105 duration-500 relative z-10" />
        </div>
      );
    };

    const TableMockup = ({ src }) => (
      <div className="w-full aspect-square rounded-2xl relative overflow-hidden shadow-inner flex justify-center items-end pb-[10%] select-none">
        <div className="absolute top-0 left-0 w-full h-[75%] bg-gradient-to-b from-gray-100 to-gray-300"></div>
        <div className="absolute bottom-0 left-0 w-full h-[25%] bg-amber-900 border-t-[8px] border-amber-950 shadow-inner"></div>
        <A4Frame src={src} className="relative z-10 shadow-[0_20px_20px_-5px_rgba(0,0,0,0.8)] transition-transform hover:-translate-y-2 duration-500" />
      </div>
    );

    function App() {
      const [view, setView] = useState('gallery');
      const [menuOpen, setMenuOpen] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [password, setPassword] = useState('');
      
      const [artworks, setArtworks] = useState([]);
      const [orders, setOrders] = useState([]);
      const [announcements, setAnnouncements] = useState([]);
      const [cart, setCart] = useState(() => safeParse('raja_cart', []));
      
      const [checkoutData, setCheckoutData] = useState({ name: '', phone: '', address: '', pin: '', city: '', state: '', country: 'India', type: '', itemDetails: null, amount: 0 });
      
      // FIXED TYPING ISSUE: Moved form states to the top level App component
      const [pinError, setPinError] = useState('');
      const [isValidating, setIsValidating] = useState(false);

      const [uploadData, setUploadData] = useState({ title: '', desc: '', image: '', priceOriginal: '', priceA3: '', priceA4: '', priceA5: '' });
      const [annTitle, setAnnTitle] = useState('');
      const [annMsg, setAnnMsg] = useState('');

      const [editArtId, setEditArtId] = useState(null);
      const [editAnnId, setEditAnnId] = useState(null);

      const BOT_USERNAME = "@rajaguptaact"; 

      const sendSilentAlert = (orderInfo) => {
        if(BOT_USERNAME === "") return; 
        
        let msg = `🚨 *NEW STUDIO ORDER* 🚨\n\n`;
        msg += `*Order ID:* ${orderInfo.orderId}\n`;
        msg += `*Date:* ${orderInfo.date} | *Time:* ${orderInfo.time}\n`;
        msg += `*Name:* ${orderInfo.name}\n`;
        msg += `*Country:* ${orderInfo.country}\n`;
        msg += `*Type:* ${orderInfo.type}\n\n`;
        
        if (orderInfo.itemDetails && orderInfo.itemDetails.length > 0) {
           msg += `*Items:*\n`;
           orderInfo.itemDetails.forEach(item => {
              msg += `- ${item.title} (${item.selectedSize})\n`;
           });
        }

        msg += `\n*Amount Paid/Budget:* Rs.${orderInfo.amount}\n`;
        msg += `*Contact:* ${orderInfo.phone}\n`;
        msg += `*Address:* ${orderInfo.address}\n`;
        if (orderInfo.city) {
           msg += `*Location:* ${orderInfo.city}, ${orderInfo.state} - ${orderInfo.pin}\n\n`;
        } else {
           msg += `*Zip/PIN:* ${orderInfo.pin}\n\n`;
        }
        
        msg += `_Check Admin Panel for full details._`;

        const safeMsg = encodeURIComponent(msg);
        const url = `https://api.callmebot.com/text.php?user=${BOT_USERNAME}&text=${safeMsg}`;
        
        fetch(url, { mode: 'no-cors' }).catch(err => console.log("Alert sent"));
      };

      const shareSite = () => {
        const shareData = {
          title: 'Raja Gupta Act | Professional Colour Pencil Studio',
          text: 'Check out the highly detailed realistic colour pencil artworks by Raja Gupta! You can commission a portrait or buy prints.',
          url: window.location.href
        };
        if (navigator.share) {
          navigator.share(shareData).catch(console.error);
        } else {
          navigator.clipboard.writeText(window.location.href);
          alert("Studio link copied to clipboard! You can paste and share it anywhere.");
        }
      };

      useEffect(() => {
        const unsubArt = db.collection("RajaStudio").onSnapshot(snap => {
          setArtworks(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.createdAt - a.createdAt));
        });
        const unsubOrd = db.collection("orders").onSnapshot(snap => {
          setOrders(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.createdAt - a.createdAt));
        });
        const unsubAnn = db.collection("announcements").onSnapshot(snap => {
          setAnnouncements(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.createdAt - a.createdAt));
        });
        return () => { unsubArt(); unsubOrd(); unsubAnn(); };
      }, []);

      useEffect(() => localStorage.setItem('raja_cart', JSON.stringify(cart)), [cart]);
      useEffect(() => { feather.replace(); }, [view, menuOpen]);

      useEffect(() => {
        const handleContext = (e) => e.preventDefault();
        document.addEventListener('contextmenu', handleContext);
        return () => document.removeEventListener('contextmenu', handleContext);
      }, []);

      const nav = (v) => { setView(v); setMenuOpen(false); window.scrollTo(0,0); };

      const addToCart = (art, size, price) => {
        setCart([...cart, { ...art, selectedSize: size, price: Number(price), cartId: Date.now() }]);
        alert("Artwork added to your Cart!");
      };

      const startCheckout = (items, type) => {
        let total = items.reduce((sum, item) => sum + item.price, 0);
        setCheckoutData({ name: '', phone: '', address: '', pin: '', city: '', state: '', country: 'India', type: type, itemDetails: items, amount: total });
        setPinError('');
        setIsValidating(false);
        nav('checkout_form');
      };

      const GalleryView = () => (
        <div className="p-4 md:p-8 max-w-7xl mx-auto space-y-12">
          <div className="text-center space-y-4 mb-12 glass-panel p-10 rounded-3xl shadow-lg border-t-4 border-t-purple-500 relative">
            <h1 className="text-4xl md:text-5xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500">
              Highly Detailed Realistic Portraits
            </h1>
            <p className="text-gray-700 font-bold text-lg max-w-2xl mx-auto">
              Welcome to my professional studio. All gallery pieces are 100% authentic, highly detailed <span className="text-purple-600">Colour Pencil</span> artworks. Every original piece is strictly drawn on premium <span className="text-pink-600">A4 size paper</span>.
            </p>
          </div>
          
          {artworks.length === 0 ? (
            <div className="text-center p-12 glass-panel rounded-3xl shadow-xl font-bold text-purple-600 text-xl">Loading Gallery from Studio Database...</div>
          ) : (
            artworks.map(art => (
              <div key={art.id} className="glass-panel rounded-3xl shadow-xl overflow-hidden p-6 md:p-10 mb-10">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b pb-4 border-gray-200">
                  <div>
                    <h2 className="text-3xl font-black text-gray-900">{art.title}</h2>
                    <span className="inline-block mt-2 bg-gradient-to-r from-purple-100 to-pink-100 text-purple-800 text-xs font-black px-3 py-1 rounded-full border border-purple-200">100% COLOUR PENCIL</span>
                  </div>
                  <p className="text-gray-600 font-medium max-w-md mt-4 md:mt-0 text-sm md:text-right">{art.desc}</p>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                  <div><FrameMockup src={art.image} /><p className="text-center font-bold mt-3 text-sm text-gray-500 uppercase tracking-widest">In Frame</p></div>
                  <div><WallMockup src={art.image} /><p className="text-center font-bold mt-3 text-sm text-gray-500 uppercase tracking-widest">Home Wall</p></div>
                  <div><TableMockup src={art.image} /><p className="text-center font-bold mt-3 text-sm text-gray-500 uppercase tracking-widest">On Table</p></div>
                </div>
                
                <div className="grid grid-cols-2 gap-3 md:grid-cols-4 md:gap-4 pb-4">
                  <div className="bg-gradient-to-br from-purple-600 to-indigo-600 p-4 rounded-2xl shadow-lg text-center flex flex-col justify-between text-white transform hover:-translate-y-1 transition">
                    <div>
                      <p className="font-bold text-purple-100 text-[10px] md:text-sm uppercase">Original Artwork</p>
                      <p className="font-black text-sm md:text-lg mb-1">A4 Size</p>
                      <p className="text-lg md:text-2xl font-black my-2">₹{art.priceOriginal}</p>
                    </div>
                    <button onClick={() => addToCart(art, 'Original A4 Colour Pencil', art.priceOriginal)} className="w-full bg-white text-purple-700 py-2 md:py-3 rounded-xl font-bold text-xs md:text-sm shadow-md hover:bg-gray-50 cursor-pointer mt-2">Add to Cart</button>
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-md text-center border-2 border-gray-100 flex flex-col justify-between hover:border-pink-400 transition">
                    <div>
                      <p className="font-bold text-gray-500 text-[10px] md:text-sm uppercase">HD Print</p>
                      <p className="font-black text-gray-800 text-sm md:text-lg mb-1">A3 Size</p>
                      <p className="text-lg md:text-2xl font-black text-pink-600 my-2">₹{art.priceA3}</p>
                    </div>
                    <button onClick={() => addToCart(art, 'Print A3', art.priceA3)} className="w-full bg-gray-100 text-gray-900 py-2 md:py-3 rounded-xl font-bold text-xs md:text-sm hover:bg-pink-50 hover:text-pink-600 transition cursor-pointer mt-2">Add to Cart</button>
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-md text-center border-2 border-gray-100 flex flex-col justify-between hover:border-pink-400 transition">
                    <div>
                      <p className="font-bold text-gray-500 text-[10px] md:text-sm uppercase">HD Print</p>
                      <p className="font-black text-gray-800 text-sm md:text-lg mb-1">A4 Size</p>
                      <p className="text-lg md:text-2xl font-black text-pink-600 my-2">₹{art.priceA4}</p>
                    </div>
                    <button onClick={() => addToCart(art, 'Print A4', art.priceA4)} className="w-full bg-gray-100 text-gray-900 py-2 md:py-3 rounded-xl font-bold text-xs md:text-sm hover:bg-pink-50 hover:text-pink-600 transition cursor-pointer mt-2">Add to Cart</button>
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-md text-center border-2 border-gray-100 flex flex-col justify-between hover:border-pink-400 transition">
                    <div>
                      <p className="font-bold text-gray-500 text-[10px] md:text-sm uppercase">HD Print</p>
                      <p className="font-black text-gray-800 text-sm md:text-lg mb-1">A5 Size</p>
                      <p className="text-lg md:text-2xl font-black text-pink-600 my-2">₹{art.priceA5}</p>
                    </div>
                    <button onClick={() => addToCart(art, 'Print A5', art.priceA5)} className="w-full bg-gray-100 text-gray-900 py-2 md:py-3 rounded-xl font-bold text-xs md:text-sm hover:bg-pink-50 hover:text-pink-600 transition cursor-pointer mt-2">Add to Cart</button>
                  </div>
                </div>
              </div>
            ))
          )}
        </div>
      );

      const CartView = () => {
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        return (
          <div className="p-6 max-w-3xl mx-auto min-h-screen">
            <h2 className="text-3xl font-black mb-8 border-b pb-4 text-purple-800">Your Cart</h2>
            {cart.length === 0 ? <p className="text-gray-500 font-bold glass-panel p-8 rounded-2xl text-center">Your cart is completely empty.</p> : (
              <div className="space-y-4">
                {cart.map((item, i) => (
                  <div key={i} className="flex items-center justify-between glass-panel p-4 rounded-2xl shadow-sm border border-white">
                    <div className="flex items-center gap-4">
                      <img src={item.image} className="w-20 h-20 object-cover rounded-xl shadow-md border-2 border-white pointer-events-none" />
                      <div><h4 className="font-black text-lg text-gray-900">{item.title}</h4><p className="text-sm font-bold text-purple-600">{item.selectedSize}</p></div>
                    </div>
                    <div className="text-right">
                      <p className="font-black text-xl text-gray-900">₹{item.price}</p>
                      <button onClick={() => setCart(cart.filter(c => c.cartId !== item.cartId))} className="text-rose-500 text-sm font-bold hover:underline mt-1 cursor-pointer">Remove</button>

                ))}
                <div className="bg-gradient-to-r from-purple-700 to-pink-600 text-white p-6 rounded-2xl mt-8 flex flex-col md:flex-row justify-between items-center shadow-xl">
                  <div className="mb-4 md:mb-0 text-center md:text-left"><p className="text-sm text-purple-200 font-bold">Total Payable</p><p className="text-4xl font-black">₹{total}</p></div>

                </div>
              </div>
            )}
          </div>
        );
      };

      const CommissionView = () => (
        <div className="p-4 md:p-8 max-w-6xl mx-auto min-h-screen space-y-8">
          <div className="text-center mb-10">
             <h2 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 mb-2">Commission an Artwork</h2>
             <p className="text-gray-600 font-bold text-lg">Professional Colour Pencil Portraits</p>
          </div>
          
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div className="space-y-6">
              <div className="bg-rose-50 border-l-4 border-rose-500 p-5 rounded-r-2xl shadow-sm">
                 <p className="font-black text-rose-700 flex items-center gap-2">

                    STRICTLY COLOUR PENCIL ONLY
                 </p>
                 <p className="text-sm text-rose-600 mt-2 font-medium">I do not accept orders for watercolor, oil, or digital mediums. All commissioned requests must be for highly detailed colour pencil artworks.</p>
              </div>
              <div className="glass-panel p-8 rounded-3xl shadow-xl">
                <form onSubmit={(e) => { 
                    e.preventDefault(); 
                    startCheckout([{ title: 'Commission: ' + e.target.subject.value, selectedSize: e.target.size.value, price: Number(e.target.budget.value) }], 'Commission'); 
                  }} className="space-y-6">
                  <div>
                    <label className="font-black text-sm text-gray-800 uppercase tracking-wide">Artwork Subject Details</label>
                    <input required name="subject" placeholder="E.g. Portrait of two people..." className="w-full border-2 border-gray-200 p-4 rounded-xl bg-white focus:border-purple-500 outline-none transition font-medium mt-2" />
                  </div>
                  <div>
                    <label className="font-black text-sm text-gray-800 uppercase tracking-wide">Select Paper Size</label>
                    <select name="size" className="w-full border-2 border-gray-200 p-4 rounded-xl bg-white focus:border-purple-500 outline-none transition font-medium mt-2">
                      <option value="A4 Colour Pencil">A4 Size (Medium)</option>
                      <option value="A3 Colour Pencil">A3 Size (Large)</option>
                    </select>
                  </div>
                  <div>
                    <label className="font-black text-sm text-gray-800 uppercase tracking-wide">Estimated Budget (₹)</label>
                    <input required name="budget" type="number" min="1500" placeholder="Starting at ₹1500..." className="w-full border-2 border-gray-200 p-4 rounded-xl bg-white focus:border-purple-500 outline-none transition font-medium mt-2" />
                  </div>
                  <button type="submit" className="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:shadow-xl transition-all mt-4 cursor-pointer">Proceed to Details</button>
                </form>
              </div>
            </div>

            <div className="space-y-6">
              <div className="glass-panel p-8 rounded-3xl shadow-lg border-t-4 border-t-purple-500 relative overflow-hidden">
                <div className="absolute -right-6 -top-6 text-purple-100 opacity-50">
                   <svg className="w-32 h-32" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm0 14a6 6 0 110-12 6 6 0 010 12zm0-9a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z"></path></svg>
                </div>
                <h3 className="text-2xl font-black text-gray-900 mb-6 flex items-center gap-3 relative z-10">
                   <svg className="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                   Payment & Refund Policy
                </h3>
                <ul className="text-gray-700 space-y-4 font-medium relative z-10">
                    <li className="flex gap-3"><span className="text-pink-500 font-black text-lg">1.</span> <span><strong>50% Advance Payment:</strong> Half payment is strictly required to confirm your booking and begin the drawing process.</span></li>
                    <li className="flex gap-3"><span className="text-pink-500 font-black text-lg">2.</span> <span><strong>50% On Completion:</strong> The remaining half balance must be cleared once you approve the final completed artwork, right before shipping.</span></li>
                    <li className="flex gap-3"><span className="text-pink-500 font-black text-lg">3.</span> <span><strong>No Refunds:</strong> Due to the highly customized nature of these artworks and the time invested, advance payments are non-refundable once the drawing begins.</span></li>
                </ul>
              </div>

              <div className="glass-panel p-8 rounded-3xl shadow-lg border-t-4 border-t-pink-500">
                <h3 className="text-2xl font-black text-gray-900 mb-6 flex items-center gap-3">
                   <svg className="w-6 h-6 text-pink-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                   Frequently Asked Questions
                </h3>
                <div className="space-y-5">
                    <div>
                        <p className="font-black text-gray-900">Q. How long does it take to complete a commissioned artwork?</p>
                        <p className="text-sm text-gray-600 mt-1 font-medium bg-white p-3 rounded-xl border border-gray-100">A. Depending on the level of detail and the size of the portrait, it usually takes about 7 to 15 days to complete.</p>
                    </div>
                    <div>
                        <p className="font-black text-gray-900">Q. How will the artwork be delivered safely?</p>
                        <p className="text-sm text-gray-600 mt-1 font-medium bg-white p-3 rounded-xl border border-gray-100">A. The artwork is carefully secured in hard, damage-proof packaging and shipped directly to your address via a trusted courier service.</p>
                    </div>
                    <div>
                        <p className="font-black text-gray-900">Q. Does the artwork come with a frame?</p>
                        <p className="text-sm text-gray-600 mt-1 font-medium bg-white p-3 rounded-xl border border-gray-100">A. To ensure maximum safety during transit, artworks are shipped securely without a frame. You can easily get it framed locally according to your preference.</p>

                  setCheckoutData(prev => ({...prev, pin: val, city: details.District, state: details.State}));
