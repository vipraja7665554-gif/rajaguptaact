        let currentPhoneError = '';
        const cleanedPhone = checkoutData.phone.replace(/[\s-]/g, '');
        
        if (cleanedPhone) {
            if (checkoutData.country === 'India') {
                if (!cleanedPhone.startsWith('+91')) {
                    currentPhoneError = "❌ Indian number must start with +91";
                } else if (cleanedPhone.length !== 13) {
                    currentPhoneError = "❌ Must be exactly 10 digits after +91";
                } else {
                    isPhoneValidNow = true;
                }
            } else {
                if (!cleanedPhone.startsWith('+')) {
                    currentPhoneError = "❌ International format requires '+' and country code";
                } else if (cleanedPhone.length < 8 || cleanedPhone.length > 16) {
                    currentPhoneError = "❌ Invalid international number configuration length";
                } else {
                    isPhoneValidNow = true;

        }

        let isPinValidNow = false;

            isPinValidNow = checkoutData.pin.length === 6 && checkoutData.city !== '';

            isPinValidNow = checkoutData.pin.length >= 3;

          setCheckoutData({...checkoutData, email: e.target.value});
        };

        const handlePhoneChange = (e) => {
          let val = e.target.value;
          if (val.length === 1 && /[1-9]/.test(val)) val = '+' + val;
          val = val.replace(/[^\d+\s-]/g, '');
          if (val.lastIndexOf('+') > 0) {
             val = val.substring(0, val.lastIndexOf('+')) + val.substring(val.lastIndexOf('+')).replace(/\+/g, '');

        };

          const val = e.target.value.replace(/[^0-9A-Za-z\s-]/g, '');
          setCheckoutData(prev => ({...prev, pin: val, city: '', state: ''}));
          
          if (checkoutData.country === 'India' && val.length === 6 && /^\d+$/.test(val)) {
              setIsValidating(true);
              try {
                const res = await fetch(`https://api.postalpincode.in/pincode/${val}`);
                const data = await res.json();
